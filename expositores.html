<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expositores | Capacitación CATA I+D</title>
    <style>
        /* Estilos generales y fondo */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a99ba9 0%, #5b5c5c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal tipo tarjeta */
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #54356f;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(231, 224, 224, 0.1);
            text-align: center;
            margin: 20px;
        }

        /* --- NUEVO ESTILO PARA EL LOGO DEL ENCABEZADO --- */
        /* Eliminamos el estilo del círculo y creamos este nuevo */
        .header-logo-container {
            width: 100%;
            max-width: 250px; /* Ancho máximo para que no ocupe todo */
            margin: 0 auto 25px auto; /* Centrado y separado del título */
            text-align: center;
        }

        .header-logo-img {
            max-width: 100%;
            height: auto; /* Mantiene la proporción */
            display: block;
            margin: 0 auto;
            /* Opcional: una sombra muy sutil para dar relieve */
            filter: drop-shadow(0px 2px 4px rgba(159, 147, 167, 0.15));
        }
        /* ----------------------------------------------- */
        
        h1 {
            color: #fffefe;
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        p.subtitle {
            color: #f4e7e7;
            font-size: 14px;
            margin: 0 0 30px 0;
            font-weight: 300;
        }

        /* Estilo de los botones (Enlaces) */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #4a4a4a;
            text-decoration: none;
            padding: 16px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            border: 2px solid #a3bdd0;
            transition: all 0.3s ease;
        }

        /* Efecto al pasar el mouse (Hover) */
        .link-btn:hover {
            background-color: #f8fbff;
            border-color: #8b5ba8;
            color: #8b5ba8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(139, 91, 168, 0.1);
        }

        /* Icono de LinkedIn */
        .linkedin-icon {
            color: #0077b5;
            font-size: 18px;
            margin-right: 10px;
            font-weight: bold;
        }

        /* Pie de página */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        
<div style="display: flex; justify-content: center; align-items: center; width: 100%; margin: 0 auto 25px auto; padding: 0 10px; box-sizing: border-box;">

</div>
