<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expositores | Capacitación CATA I+D</title>
    <style>
        /* Estilos generales y fondo */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #706b70 0%, #e0e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal tipo tarjeta */
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            margin: 20px;
        }

        /* Estilo restaurado: Círculo con el emoji */
        .profile-img {
            width: 90px;
            height: 90px;
            background-color: #8b5ba8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
            color: white;
            font-size: 32px;
            box-shadow: 0 5px 15px rgba(139, 91, 168, 0.3);
        }
        
        h1 {
            color: #333;
            font-size: 22px;
            margin: 0 0 5px 0;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin: 0 0 30px 0;
            font-weight: 300;
        }

        /* Estilo de los botones (Enlaces) */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #4a4a4a;
            text-decoration: none;
            padding: 16px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            border: 2px solid #eef2f5;
            transition: all 0.3s ease;
        }

        /* Efecto al pasar el mouse (Hover) */
        .link-btn:hover {
            background-color: #f8fbff;
            border-color: #8b5ba8;
            color: #8b5ba8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(139, 91, 168, 0.1);
        }

        /* Icono de LinkedIn */
        .linkedin-icon {
            color: #0077b5;
            font-size: 18px;
            margin-right: 10px;
            font-weight: bold;
        }

        /* Pie de página */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-img">
            🔭
        </div>
        
        <h1>Perfiles de Expositores</h1>
        <p class="subtitle">Programa de Capacitaciones CATA I+D</p>

        <a href="https://www.linkedin.com/in/andrea-catalan-14819b5" target="_blank" class="link-btn">
            <span class="linkedin-icon">in</span> Andrea Catalán
        </a>

        <a href="https://www.linkedin.com/in/katherinesantospavez" target="_blank" class="link-btn">
            <span class="linkedin-icon">in</span> Katherine Santos Pavez
        </a>

        <a href="https://www.linkedin.com/in/pratletelier" target="_blank" class="link-btn">
            <span class="linkedin-icon">in</span> Santiago Prat Letelier
        </a>

        <div class="footer">
            Corporación CATA - 2026
        </div>
    </div>

</body>
</html>
